name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 21 (required by Capacitor 8) ─────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Node.js ───────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install npm dependencies ──────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 5. Build Vite web app ────────────────────────────────────────
      - name: Build Vite web app
        run: npm run build

      # ── 6. Copy web assets into Android project ───────────────────────
      - name: Copy web assets into Android project
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/. android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          echo "Assets ready:"
          ls android/app/src/main/assets/public/ | head -10

      # ── 7. Accept Android SDK licenses ───────────────────────────────
      - name: Accept Android SDK licenses
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --licenses 2>/dev/null || true

      # ── 8. Install Android SDK 35 (pre-installed on runner) ──────────
      - name: Install Android SDK 35
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          $SDKMANAGER "platforms;android-35" "build-tools;35.0.0"
          echo "Installed:"
          $SDKMANAGER --list_installed 2>/dev/null | grep -E "platforms|build-tools" || true

      # ── 9. Set Android SDK path ──────────────────────────────────────
      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      # ── 10. Make Gradle executable ───────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 11. Build debug APK ───────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 12. Upload APK ───────────────────────────────────────────────
      - name: Find and upload APK
        run: |
          mkdir -p release
          APK=$(find android/app/build/outputs -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            find android/app/build -type f 2>/dev/null | head -20
            exit 1
          fi
          echo "APK: $APK"
          cp "$APK" "release/AI-Career-Toolkit-v${{ github.run_number }}.apk"
          ls -lh release/

      # ── 13. Upload artifact ──────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Career-Toolkit-APK
          path: release/*.apk
          retention-days: 30

      # ── 14. Create GitHub Release ─────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "AI Career Toolkit v1.0.${{ github.run_number }}"
          body: |
            ## 📱 AI Career Toolkit Android APK

            ### Install karo:
            1. Neeche se **APK download** karo
            2. Phone pe allow karo: Settings → Security → Unknown Sources ✓
            3. APK open karo → Install karo → Done!

            ### Features:
            - 🤖 AI CV / Resume Builder
            - ✉️ Cover Letter Generator
            - 📊 ATS Resume Checker
            - 🎤 Interview Preparation
            - 💼 LinkedIn Optimizer
            - 🌐 Freelance Bio Generator
            - 🏛️ Government Job Templates
            - 📋 Job Application Tracker
            - 🎯 AI Career Coach
          files: release/*.apk
          draft: false
          prerelease: false
