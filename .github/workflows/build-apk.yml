name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Vite web app
        run: npm run build

      - name: Copy web assets into Android project
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/. android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install Android SDK 35
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Validate Gradle wrapper
        run: |
          echo "Java version:"
          java -version
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "Gradle wrapper:"
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Build debug APK
        working-directory: android
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log
        continue-on-error: true

      - name: Show Gradle errors if build failed
        if: always()
        run: |
          if [ -f /tmp/gradle.log ]; then
            echo "====== BUILD ERRORS ======"
            grep -E "FAILURE:|error:|Error|Exception|Could not|failed|FAILED" \
              /tmp/gradle.log | grep -v "^Download\|deprecated\|warning\|Warning" | head -50 || true
            echo "====== LAST 60 LINES ======"
            tail -60 /tmp/gradle.log
          fi

      - name: Fail if APK not built
        run: |
          APK=$(find android/app/build/outputs -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "APK not found — build failed. Check errors above."
            exit 1
          fi
          echo "APK found: $APK"

      - name: Save APK
        run: |
          mkdir -p release
          APK=$(find android/app/build/outputs -name "*.apk" | head -1)
          cp "$APK" "release/AI-Career-Toolkit-v${{ github.run_number }}.apk"
          ls -lh release/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Career-Toolkit-APK
          path: release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "AI Career Toolkit v1.0.${{ github.run_number }}"
          body: |
            ## 📱 AI Career Toolkit Android APK

            ### Install karo:
            1. Neeche se **APK download** karo
            2. Settings → Security → Unknown Sources ✓
            3. APK open karo → Install → Done!
          files: release/*.apk
          draft: false
          prerelease: false
