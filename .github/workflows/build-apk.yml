name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 21 (required by @capacitor/android 8.x) ─────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Node.js ───────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install dependencies ──────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 5. Build Vite web app ────────────────────────────────────────
      - name: Build Vite web app
        run: npm run build

      # ── 6. Copy web assets directly into Android project ─────────────
      - name: Copy web assets into Android project
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/. android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          echo "Assets copied:"
          ls android/app/src/main/assets/public/

      # ── 7. Set Android SDK path ──────────────────────────────────────
      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      # ── 8. Install Android SDK 36 ────────────────────────────────────
      - name: Install Android SDK 36
        run: |
          echo "Available SDK manager:"
          ls $ANDROID_HOME/cmdline-tools/
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | $SDKMANAGER "platforms;android-36" "build-tools;36.0.0" 2>&1 || \
          echo "y" | $SDKMANAGER "platforms;android-35" "build-tools;35.0.0" 2>&1 || true
          echo "Installed platforms:"
          $SDKMANAGER --list_installed 2>/dev/null | grep "platforms;" || true

      # ── 9. Make Gradle executable ────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 10. Build debug APK ───────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -100

      # ── 11. Rename APK ────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "release/AI-Career-Toolkit-v${{ github.run_number }}.apk"
          echo "APK ready:"
          ls -lh release/

      # ── 12. Upload APK as artifact ────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Career-Toolkit-APK
          path: release/*.apk
          retention-days: 30

      # ── 13. Create GitHub Release ─────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "AI Career Toolkit v1.0.${{ github.run_number }}"
          body: |
            ## 📱 AI Career Toolkit Android APK

            ### Install karo:
            1. Neeche se **APK download** karo
            2. Phone pe allow karo: Settings → Security → Unknown Sources ✓
            3. APK open karo → Install karo → Done!

            ### Features:
            - 🤖 AI CV / Resume Builder
            - ✉️ Cover Letter Generator
            - 📊 ATS Resume Checker
            - 🎤 Interview Preparation
            - 💼 LinkedIn Optimizer
            - 🌐 Freelance Bio Generator
            - 🏛️ Government Job Templates
            - 📋 Job Application Tracker
            - 🎯 AI Career Coach
          files: release/*.apk
          draft: false
          prerelease: false
