name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Set SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/g.log
          B=${PIPESTATUS[0]}
          cat /tmp/g.log >> $GITHUB_STEP_SUMMARY
          exit $B

      - uses: actions/upload-artifact@v4
        with:
          name: AI-Career-Toolkit-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "AI Career Toolkit v1.0.${{ github.run_number }}"
          body: "Settings → Unknown Sources → Install APK"
          files: android/app/build/outputs/apk/debug/app-debug.apk
